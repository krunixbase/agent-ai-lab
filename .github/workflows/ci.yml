name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy ruff bandit pytest

      - name: Run mypy
        run: mypy src

      - name: Run ruff
        run: ruff check src

      - name: Run bandit
        run: bandit -r src

      - name: Run pytest
        run: pytest -q

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@f4b8f3e2c6e2c0a3b8e2a0d9c3f1a2b9c8d7e6f5
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/agent-ai-lab:latest .

      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/agent-ai-lab:latest
