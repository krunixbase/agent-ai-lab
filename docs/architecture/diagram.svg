<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1100">
  <style>
    .box { fill: #f8f8f8; stroke: #333; stroke-width: 1.4; }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
    .text { font-family: Arial, sans-serif; font-size: 13px; }
    .arrow { stroke: #444; stroke-width: 1.4; marker-end: url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7"
            refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444" />
    </marker>
  </defs>

  <!-- Interaction -->
  <rect class="box" x="550" y="40" width="300" height="90" rx="8" ry="8"/>
  <text class="title" x="700" y="75" text-anchor="middle">Interaction Layer</text>
  <text class="text" x="700" y="100" text-anchor="middle">Intent, dialogue, responses</text>

  <!-- Cognitive -->
  <rect class="box" x="550" y="170" width="300" height="90" rx="8" ry="8"/>
  <text class="title" x="700" y="205" text-anchor="middle">Cognitive &amp; Planning</text>
  <text class="text" x="700" y="230" text-anchor="middle">Reasoning, planning, strategies</text>

  <!-- Memory -->
  <rect class="box" x="100" y="300" width="300" height="90" rx="8" ry="8"/>
  <text class="title" x="250" y="335" text-anchor="middle">Memory &amp; Knowledge</text>
  <text class="text" x="250" y="360" text-anchor="middle">Memory, retrieval, knowledge</text>

  <!-- Tooling -->
  <rect class="box" x="1000" y="300" width="300" height="90" rx="8" ry="8"/>
  <text class="title" x="1150" y="335" text-anchor="middle">Tooling &amp; Execution</text>
  <text class="text" x="1150" y="360" text-anchor="middle">Tools, execution, outcomes</text>

  <!-- Runtime -->
  <rect class="box" x="550" y="300" width="300" height="90" rx="8" ry="8"/>
  <text class="title" x="700" y="335" text-anchor="middle">Runtime &amp; Orchestration</text>
  <text class="text" x="700" y="360" text-anchor="middle">Agent loop, state, scheduling</text>

  <!-- Deployment -->
  <rect class="box" x="550" y="430" width="300" height="90" rx="8" ry="8"/>
  <text class="title" x="700" y="465" text-anchor="middle">Deployment, Reliability &amp; Performance</text>
  <text class="text" x="700" y="490" text-anchor="middle">Environments, scaling, reliability</text>

  <!-- Safety -->
  <rect class="box" x="100" y="560" width="300" height="90" rx="8" ry="8"/>
  <text class="title" x="250" y="595" text-anchor="middle">Safety, Ethics &amp; Governance</text>
  <text class="text" x="250" y="620" text-anchor="middle">Policies, safety, compliance</text>

  <!-- Evaluation -->
  <rect class="box" x="1000" y="560" width="300" height="90" rx="8" ry="8"/>
  <text class="title" x="1150" y="595" text-anchor="middle">Evaluation, Testing &amp; Meta-learning</text>
  <text class="text" x="1150" y="620" text-anchor="middle">Metrics, tests, optimization</text>

  <!-- Multi-agent -->
  <rect class="box" x="100" y="690" width="300" height="90" rx="8" ry="8"/>
  <text class="title" x="250" y="725" text-anchor="middle">Multi-agent</text>
  <text class="text" x="250" y="750" text-anchor="middle">Coordination, communication</text>

  <!-- Embodiment -->
  <rect class="box" x="1000" y="690" width="300" height="90" rx="8" ry="8"/>
  <text class="title" x="1150" y="725" text-anchor="middle">Embodiment &amp; Simulation</text>
  <text class="text" x="1150" y="750" text-anchor="middle">Perception, simulation, motor control</text>

  <!-- Cross-layer -->
  <rect class="box" x="550" y="820" width="300" height="90" rx="8" ry="8"/>
  <text class="title" x="700" y="855" text-anchor="middle">Cross-layer Architecture</text>
  <text class="text" x="700" y="880" text-anchor="middle">Config, lifecycle, observability</text>

  <!-- Arrows -->
  <line class="arrow" x1="700" y1="130" x2="700" y2="170" />
  <line class="arrow" x1="700" y1="260" x2="700" y2="300" />
  <line class="arrow" x1="700" y1="390" x2="700" y2="430" />

  <line class="arrow" x1="550" y1="215" x2="400" y2="300" />
  <line class="arrow" x1="850" y1="215" x2="1000" y2="300" />

  <line class="arrow" x1="700" y1="520" x2="250" y2="560" />
  <line class="arrow" x1="700" y1="520" x2="1150" y2="560" />

  <line class="arrow" x1="700" y1="520" x2="250" y2="690" />
  <line class="arrow" x1="700" y1="520" x2="1150" y2="690" />

  <line class="arrow" x1="700" y1="910" x2="250" y2="605" />
  <line class="arrow" x1="700" y1="910" x2="1150" y2="605" />
</svg>
